<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Deep background -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a2535;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </radialGradient>

    <!-- Outer cube face gradients -->
    <linearGradient id="faceTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:0.85" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="faceRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="faceFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a4a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0f2535;stop-opacity:0.8" />
    </linearGradient>

    <!-- Inner cube gradients (brighter, the "4th dimension" inner cube) -->
    <linearGradient id="innerFaceTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5eead4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="innerFaceRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="innerFaceFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#134e4a;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#0f3a35;stop-opacity:0.85" />
    </linearGradient>

    <!-- Teal glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for edges -->
    <filter id="edgeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer glow for whole icon -->
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGlow)" />
  <circle cx="100" cy="100" r="95" fill="none" stroke="#2dd4bf" stroke-width="0.5" opacity="0.2"/>

  <!--
    TESSERACT (4D hypercube projection)
    Outer cube vertices (isometric-ish, slightly tilted for dynamism):
      A = top-left-back    = (58, 42)
      B = top-right-back   = (118, 28)
      C = top-right-front  = (152, 62)
      D = top-left-front   = (92, 76)
      E = bottom-left-back = (58, 112)
      F = bottom-right-back= (118, 98)
      G = bottom-right-front=(152,132)
      H = bottom-left-front= (92, 146)

    Inner cube vertices (scaled ~0.42, centered at same centroid ~(105, 87)):
      a = (82, 72)
      b = (112, 64)
      c = (130, 82)
      d = (100, 90)
      e = (82, 102)
      f = (112, 94)
      g = (130, 112)
      h = (100, 120)
  -->

  <!-- === OUTER CUBE FACES === -->

  <!-- Top face: A-B-C-D -->
  <polygon points="58,42 118,28 152,62 92,76" fill="url(#faceTop)" stroke="#2dd4bf" stroke-width="1.2" opacity="0.75"/>

  <!-- Right face: B-C-G-F -->
  <polygon points="118,28 152,62 152,132 118,98" fill="url(#faceRight)" stroke="#2dd4bf" stroke-width="1.2" opacity="0.6"/>

  <!-- Front face: D-C-G-H -->
  <polygon points="92,76 152,62 152,132 92,146" fill="url(#faceFront)" stroke="#2dd4bf" stroke-width="1.2" opacity="0.55"/>

  <!-- Left face: A-D-H-E -->
  <polygon points="58,42 92,76 92,146 58,112" fill="#0f2535" stroke="#2dd4bf" stroke-width="1.2" opacity="0.5"/>

  <!-- Bottom face: E-F-G-H -->
  <polygon points="58,112 118,98 152,132 92,146" fill="#0a1e2e" stroke="#2dd4bf" stroke-width="1.2" opacity="0.4"/>

  <!-- Back face: A-B-F-E -->
  <polygon points="58,42 118,28 118,98 58,112" fill="#0d1a28" stroke="#2dd4bf" stroke-width="1.2" opacity="0.35"/>

  <!-- === INNER CUBE FACES === -->

  <!-- Top face inner: a-b-c-d -->
  <polygon points="82,72 112,64 130,82 100,90" fill="url(#innerFaceTop)" stroke="#5eead4" stroke-width="1" opacity="0.9"/>

  <!-- Right face inner: b-c-g-f -->
  <polygon points="112,64 130,82 130,112 112,94" fill="url(#innerFaceRight)" stroke="#5eead4" stroke-width="1" opacity="0.85"/>

  <!-- Front face inner: d-c-g-h -->
  <polygon points="100,90 130,82 130,112 100,120" fill="url(#innerFaceFront)" stroke="#5eead4" stroke-width="1" opacity="0.8"/>

  <!-- Left face inner: a-d-h-e -->
  <polygon points="82,72 100,90 100,120 82,102" fill="#134e4a" stroke="#5eead4" stroke-width="1" opacity="0.75"/>

  <!-- Bottom face inner: e-f-g-h -->
  <polygon points="82,102 112,94 130,112 100,120" fill="#0d3a36" stroke="#5eead4" stroke-width="1" opacity="0.65"/>

  <!-- Back face inner: a-b-f-e -->
  <polygon points="82,72 112,64 112,94 82,102" fill="#0f3535" stroke="#5eead4" stroke-width="1" opacity="0.6"/>

  <!-- === CONNECTING EDGES (4D dimension lines) === -->
  <!-- These connect outer vertices to inner vertices - the "4th dimension" connectors -->

  <!-- A(58,42) -> a(82,72) -->
  <line x1="58" y1="42" x2="82" y2="72" stroke="#2dd4bf" stroke-width="1.2" opacity="0.65" stroke-dasharray="4,3" filter="url(#edgeGlow)"/>
  <!-- B(118,28) -> b(112,64) -->
  <line x1="118" y1="28" x2="112" y2="64" stroke="#2dd4bf" stroke-width="1.2" opacity="0.65" stroke-dasharray="4,3" filter="url(#edgeGlow)"/>
  <!-- C(152,62) -> c(130,82) -->
  <line x1="152" y1="62" x2="130" y2="82" stroke="#2dd4bf" stroke-width="1.2" opacity="0.65" stroke-dasharray="4,3" filter="url(#edgeGlow)"/>
  <!-- D(92,76) -> d(100,90) -->
  <line x1="92" y1="76" x2="100" y2="90" stroke="#2dd4bf" stroke-width="1.2" opacity="0.65" stroke-dasharray="4,3" filter="url(#edgeGlow)"/>
  <!-- E(58,112) -> e(82,102) -->
  <line x1="58" y1="112" x2="82" y2="102" stroke="#2dd4bf" stroke-width="1.2" opacity="0.65" stroke-dasharray="4,3" filter="url(#edgeGlow)"/>
  <!-- F(118,98) -> f(112,94) -->
  <line x1="118" y1="98" x2="112" y2="94" stroke="#2dd4bf" stroke-width="1.2" opacity="0.65" stroke-dasharray="4,3" filter="url(#edgeGlow)"/>
  <!-- G(152,132) -> g(130,112) -->
  <line x1="152" y1="132" x2="130" y2="112" stroke="#2dd4bf" stroke-width="1.2" opacity="0.65" stroke-dasharray="4,3" filter="url(#edgeGlow)"/>
  <!-- H(92,146) -> h(100,120) -->
  <line x1="92" y1="146" x2="100" y2="120" stroke="#2dd4bf" stroke-width="1.2" opacity="0.65" stroke-dasharray="4,3" filter="url(#edgeGlow)"/>

  <!-- === OUTER CUBE EDGES (bright redraw on top for crispness) === -->
  <!-- Top face edges -->
  <polyline points="58,42 118,28 152,62 92,76 58,42" fill="none" stroke="#2dd4bf" stroke-width="1.6" filter="url(#edgeGlow)" opacity="0.9"/>
  <!-- Bottom face edges -->
  <polyline points="58,112 118,98 152,132 92,146 58,112" fill="none" stroke="#2dd4bf" stroke-width="1.6" filter="url(#edgeGlow)" opacity="0.7"/>
  <!-- Vertical edges -->
  <line x1="58" y1="42" x2="58" y2="112" stroke="#2dd4bf" stroke-width="1.6" filter="url(#edgeGlow)" opacity="0.8"/>
  <line x1="118" y1="28" x2="118" y2="98" stroke="#2dd4bf" stroke-width="1.6" filter="url(#edgeGlow)" opacity="0.8"/>
  <line x1="152" y1="62" x2="152" y2="132" stroke="#2dd4bf" stroke-width="1.6" filter="url(#edgeGlow)" opacity="0.8"/>
  <line x1="92" y1="76" x2="92" y2="146" stroke="#2dd4bf" stroke-width="1.6" filter="url(#edgeGlow)" opacity="0.8"/>

  <!-- === INNER CUBE EDGES (brightest) === -->
  <polyline points="82,72 112,64 130,82 100,90 82,72" fill="none" stroke="#5eead4" stroke-width="1.8" filter="url(#glow)" opacity="1"/>
  <polyline points="82,102 112,94 130,112 100,120 82,102" fill="none" stroke="#5eead4" stroke-width="1.8" filter="url(#glow)" opacity="0.9"/>
  <line x1="82" y1="72" x2="82" y2="102" stroke="#5eead4" stroke-width="1.8" filter="url(#glow)" opacity="0.95"/>
  <line x1="112" y1="64" x2="112" y2="94" stroke="#5eead4" stroke-width="1.8" filter="url(#glow)" opacity="0.95"/>
  <line x1="130" y1="82" x2="130" y2="112" stroke="#5eead4" stroke-width="1.8" filter="url(#glow)" opacity="0.95"/>
  <line x1="100" y1="90" x2="100" y2="120" stroke="#5eead4" stroke-width="1.8" filter="url(#glow)" opacity="0.95"/>

  <!-- === VERTEX DOTS === -->
  <!-- Outer vertices -->
  <circle cx="58" cy="42" r="2.5" fill="#2dd4bf" filter="url(#glow)" opacity="0.9"/>
  <circle cx="118" cy="28" r="2.5" fill="#2dd4bf" filter="url(#glow)" opacity="0.9"/>
  <circle cx="152" cy="62" r="2.5" fill="#2dd4bf" filter="url(#glow)" opacity="0.9"/>
  <circle cx="92" cy="76" r="2.5" fill="#2dd4bf" filter="url(#glow)" opacity="0.9"/>
  <circle cx="58" cy="112" r="2.5" fill="#2dd4bf" filter="url(#glow)" opacity="0.8"/>
  <circle cx="118" cy="98" r="2.5" fill="#2dd4bf" filter="url(#glow)" opacity="0.8"/>
  <circle cx="152" cy="132" r="2.5" fill="#2dd4bf" filter="url(#glow)" opacity="0.8"/>
  <circle cx="92" cy="146" r="2.5" fill="#2dd4bf" filter="url(#glow)" opacity="0.8"/>

  <!-- Inner vertices (brightest) -->
  <circle cx="82" cy="72" r="3" fill="#ffffff" filter="url(#glow)" opacity="0.95"/>
  <circle cx="112" cy="64" r="3" fill="#ffffff" filter="url(#glow)" opacity="0.95"/>
  <circle cx="130" cy="82" r="3" fill="#ffffff" filter="url(#glow)" opacity="0.95"/>
  <circle cx="100" cy="90" r="3" fill="#ffffff" filter="url(#glow)" opacity="0.95"/>
  <circle cx="82" cy="102" r="3" fill="#ffffff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="112" cy="94" r="3" fill="#ffffff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="130" cy="112" r="3" fill="#ffffff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="100" cy="120" r="3" fill="#ffffff" filter="url(#glow)" opacity="0.9"/>

  <!-- Subtle vignette ring -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#0d1117" stroke-width="4" opacity="0.5"/>
</svg>